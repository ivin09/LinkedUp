spring.application.name: api-gateway

server.port: 8080
eureka.client.service-url.defaultZone: http://localhost:8761/eureka

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/v1/users/*
              filters:
                - StripPrefix=2

            - id: post-service
              uri: lb://POSTS-SERVICE
              predicates:
                - Path=/api/v1/posts/*
              filters:
                - StripPrefix=2




#removes the docker instance from eureka server ****imp****
eureka.instance.prefer-ip-address: true
spring.cloud.inetutils.preferred-networks: 192.168



